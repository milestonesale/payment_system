<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員面板 - 會員繳費系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4">管理員登入</h2>
            <input type="password" id="adminPassword" class="w-full px-3 py-2 border border-gray-300 rounded-md mb-4" placeholder="輸入密碼">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">登入</button>
            <p id="loginError" class="text-red-600 text-sm mt-2 hidden">密碼錯誤</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">管理員面板</h1>
            <div class="flex gap-2">
                <button onclick="setTab('pending')" id="tabPending" class="px-4 py-2 bg-blue-600 text-white rounded-md">待審核</button>
                <button onclick="setTab('all')" id="tabAll" class="px-4 py-2 bg-gray-200 rounded-md">所有記錄</button>
                <button onclick="setTab('members')" id="tabMembers" class="px-4 py-2 bg-gray-200 rounded-md">會員管理</button>
                <button onclick="setTab('overdue')" id="tabOverdue" class="px-4 py-2 bg-gray-200 rounded-md">欠費名單</button>
                <button onclick="logout()" class="px-4 py-2 bg-red-600 text-white rounded-md">登出</button>
            </div>
        </div>

        <!-- Monthly Fee Config -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="flex gap-4 items-end">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">本月費用設定 (HK$)</label>
                    <input type="number" id="monthlyFee" class="border border-gray-300 rounded-md px-3 py-2 w-32" placeholder="300">
                </div>
                <button onclick="setMonthlyFee()" class="bg-green-600 text-white px-4 py-2 rounded-md">設定</button>
                <span id="feeStatus" class="text-green-600 text-sm hidden">✅ 已設定</span>
            </div>
        </div>

        <!-- Pending Payments -->
        <div id="pendingSection">
            <h2 class="text-xl font-semibold mb-4">待審核 (<span id="pendingCount">0</span>)</h2>
            <div id="pendingList" class="space-y-4"></div>
        </div>

        <!-- All Payments -->
        <div id="allSection" class="hidden">
            <h2 class="text-xl font-semibold mb-4">所有記錄</h2>
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-2 text-left">電話</th>
                            <th class="px-4 py-2 text-left">姓名</th>
                            <th class="px-4 py-2 text-left">月份</th>
                            <th class="px-4 py-2 text-left">金額</th>
                            <th class="px-4 py-2 text-left">狀態</th>
                            <th class="px-4 py-2 text-left">操作</th>
                        </tr>
                    </thead>
                    <tbody id="allPaymentsList"></tbody>
                </table>
            </div>
        </div>

        <!-- Members -->
        <div id="membersSection" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">會員管理</h2>
                <button onclick="showAddMember()" class="bg-blue-600 text-white px-4 py-2 rounded-md">新增會員</button>
            </div>
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-2 text-left">電話</th>
                            <th class="px-4 py-2 text-left">姓名/別名</th>
                            <th class="px-4 py-2 text-left">狀態</th>
                            <th class="px-4 py-2 text-left">操作</th>
                        </tr>
                    </thead>
                    <tbody id="membersList"></tbody>
                </table>
            </div>
        </div>

        <!-- Overdue -->
        <div id="overdueSection" class="hidden">
            <h2 class="text-xl font-semibold mb-4 text-red-600">欠費名單 (兩期或以上未繳)</h2>
            <div id="overdueList" class="space-y-4"></div>
            <button onclick="exportOverdue()" class="mt-4 bg-gray-600 text-white px-4 py-2 rounded-md">導出名單</button>
        </div>
    </div>

    <!-- Add/Edit Member Modal -->
    <div id="memberModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 w-full max-w-md">
            <h2 id="memberModalTitle" class="text-xl font-bold mb-4">新增會員</h2>
            <input type="hidden" id="editMemberId">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">電話號碼</label>
                    <input type="tel" id="memberPhone" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">姓名/別名</label>
                    <input type="text" id="memberNames" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="用逗號分隔多個名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">狀態</label>
                    <select id="memberStatus" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                        <option value="active">正常</option>
                        <option value="suspended">停用</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="saveMember()" class="flex-1 bg-blue-600 text-white py-2 rounded-md">儲存</button>
                <button onclick="closeMemberModal()" class="px-4 py-2 bg-gray-300 rounded-md">取消</button>
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div id="receiptModal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 hidden" onclick="closeReceiptModal()">
        <img id="receiptImage" class="max-w-4xl max-h-screen object-contain" onclick="event.stopPropagation()">
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentTab = 'pending';
        let authToken = localStorage.getItem('adminToken') || '';
        
        // Check login on load
        if (authToken) {
            document.getElementById('loginModal').classList.add('hidden');
            loadData();
        }
        
        async function login() {
            const password = document.getElementById('adminPassword').value;
            const res = await fetch(`${API_BASE}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            
            if (res.ok) {
                const data = await res.json();
                authToken = data.token;
                localStorage.setItem('adminToken', authToken);
                document.getElementById('loginModal').classList.add('hidden');
                loadData();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }
        
        function logout() {
            authToken = '';
            localStorage.removeItem('adminToken');
            document.getElementById('loginModal').classList.remove('hidden');
        }
        
        async function loadData() {
            await Promise.all([
                loadPending(),
                loadAllPayments(),
                loadMembers(),
                loadOverdue(),
                loadMonthlyFee()
            ]);
        }
        
        async function loadPending() {
            const res = await fetch(`${API_BASE}/api/admin/payments?status=pending`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            if (!res.ok) return;
            const data = await res.json();
            
            document.getElementById('pendingCount').textContent = data.payments.length;
            const html = data.payments.map(p => `
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="font-semibold">📱 ${p.phone}</span>
                            <span class="ml-2">${p.names}</span>
                        </div>
                        <span class="text-lg font-bold">$${p.amount}</span>
                    </div>
                    <div class="text-gray-600 mb-2">📅 ${p.month}</div>
                    <div class="flex gap-2">
                        <button onclick="showReceipt('${p.image_url}')" class="bg-gray-600 text-white px-3 py-1 rounded text-sm">睇入數紙</button>
                        <button onclick="approvePayment(${p.id})" class="bg-green-600 text-white px-3 py-1 rounded text-sm">批准</button>
                        <button onclick="rejectPayment(${p.id})" class="bg-red-600 text-white px-3 py-1 rounded text-sm">拒絕</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('pendingList').innerHTML = html || '<p class="text-gray-500">沒有待審核的記錄</p>';
        }
        
        async function loadAllPayments() {
            const res = await fetch(`${API_BASE}/api/admin/payments`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            if (!res.ok) return;
            const data = await res.json();
            
            const html = data.payments.map(p => {
                const statusColor = p.status === 'approved' ? 'text-green-600' : p.status === 'rejected' ? 'text-red-600' : 'text-yellow-600';
                const statusText = p.status === 'approved' ? '✅' : p.status === 'rejected' ? '❌' : '⏳';
                return `
                    <tr class="border-b">
                        <td class="px-4 py-2">${p.phone}</td>
                        <td class="px-4 py-2">${p.names}</td>
                        <td class="px-4 py-2">${p.month}</td>
                        <td class="px-4 py-2">$${p.amount}</td>
                        <td class="px-4 py-2 ${statusColor}">${statusText}</td>
                        <td class="px-4 py-2">
                            ${p.status === 'pending' ? `
                                <button onclick="approvePayment(${p.id})" class="text-green-600 hover:underline mr-2">批准</button>
                                <button onclick="rejectPayment(${p.id})" class="text-red-600 hover:underline">拒絕</button>
                            ` : ''}
                            <button onclick="showReceipt('${p.image_url}')" class="text-blue-600 hover:underline">睇圖</button>
                        </td>
                    </tr>
                `;
            }).join('');
            document.getElementById('allPaymentsList').innerHTML = html;
        }
        
        async function loadMembers() {
            const res = await fetch(`${API_BASE}/api/admin/members`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            if (!res.ok) return;
            const data = await res.json();
            
            const html = data.members.map(m => `
                <tr class="border-b">
                    <td class="px-4 py-2">${m.phone}</td>
                    <td class="px-4 py-2">${m.names}</td>
                    <td class="px-4 py-2">
                        <span class="${m.status === 'active' ? 'text-green-600' : 'text-red-600'}">${m.status === 'active' ? '正常' : '停用'}</span>
                    </td>
                    <td class="px-4 py-2">
                        <button onclick="editMember(${m.id}, '${m.phone}', '${m.names}', '${m.status}')" class="text-blue-600 hover:underline mr-2">編輯</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('membersList').innerHTML = html || '<tr><td colspan="4" class="px-4 py-4 text-gray-500">沒有會員記錄</td></tr>';
        }
        
        async function loadOverdue() {
            const res = await fetch(`${API_BASE}/api/admin/overdue`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            if (!res.ok) return;
            const data = await res.json();
            
            const html = data.members.map(m => `
                <div class="bg-red-50 border-l-4 border-red-500 p-4">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="font-semibold">📱 ${m.phone}</span>
                            <span class="ml-2">${m.names}</span>
                        </div>
                        <span class="text-red-600 font-medium">欠 ${m.overdue_count} 期</span>
                    </div>
                    <div class="text-gray-600 text-sm mt-1">欠費月份: ${m.overdue_months.join(', ')}</div>
                </div>
            `).join('');
            document.getElementById('overdueList').innerHTML = html || '<p class="text-gray-500">沒有欠費會員</p>';
        }
        
        async function loadMonthlyFee() {
            const res = await fetch(`${API_BASE}/api/admin/config/monthly_fee`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('monthlyFee').value = data.value || '';
            }
        }
        
        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('[id^="tab"]').forEach(el => el.classList.remove('bg-blue-600', 'text-white'));
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('bg-blue-600', 'text-white');
            
            document.getElementById('pendingSection').classList.add('hidden');
            document.getElementById('allSection').classList.add('hidden');
            document.getElementById('membersSection').classList.add('hidden');
            document.getElementById('overdueSection').classList.add('hidden');
            
            document.getElementById(`${tab}Section`).classList.remove('hidden');
        }
        
        async function approvePayment(id) {
            await fetch(`${API_BASE}/api/admin/payment/${id}/approve`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            loadData();
        }
        
        async function rejectPayment(id) {
            await fetch(`${API_BASE}/api/admin/payment/${id}/reject`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            loadData();
        }
        
        function showReceipt(url) {
            document.getElementById('receiptImage').src = url;
            document.getElementById('receiptModal').classList.remove('hidden');
        }
        
        function closeReceiptModal() {
            document.getElementById('receiptModal').classList.add('hidden');
        }
        
        async function setMonthlyFee() {
            const fee = document.getElementById('monthlyFee').value;
            await fetch(`${API_BASE}/api/admin/config`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${authToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ key: 'monthly_fee', value: fee })
            });
            const status = document.getElementById('feeStatus');
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 2000);
        }
        
        function showAddMember() {
            document.getElementById('memberModalTitle').textContent = '新增會員';
            document.getElementById('editMemberId').value = '';
            document.getElementById('memberPhone').value = '';
            document.getElementById('memberNames').value = '';
            document.getElementById('memberStatus').value = 'active';
            document.getElementById('memberModal').classList.remove('hidden');
        }
        
        function editMember(id, phone, names, status) {
            document.getElementById('memberModalTitle').textContent = '編輯會員';
            document.getElementById('editMemberId').value = id;
            document.getElementById('memberPhone').value = phone;
            document.getElementById('memberNames').value = names;
            document.getElementById('memberStatus').value = status;
            document.getElementById('memberModal').classList.remove('hidden');
        }
        
        function closeMemberModal() {
            document.getElementById('memberModal').classList.add('hidden');
        }
        
        async function saveMember() {
            const id = document.getElementById('editMemberId').value;
            const phone = document.getElementById('memberPhone').value.trim();
            const names = document.getElementById('memberNames').value.trim();
            const status = document.getElementById('memberStatus').value;
            
            if (!phone || !names) {
                alert('請填寫電話同姓名');
                return;
            }
            
            const url = id ? `${API_BASE}/api/admin/member/${id}` : `${API_BASE}/api/admin/member`;
            const method = id ? 'PUT' : 'POST';
            
            const res = await fetch(url, {
                method,
                headers: { 
                    'Authorization': `Bearer ${authToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ phone, names, status })
            });
            
            if (res.ok) {
                closeMemberModal();
                loadMembers();
            } else {
                const data = await res.json();
                alert(data.message || '操作失敗');
            }
        }
        
        function exportOverdue() {
            const list = document.getElementById('overdueList');
            const items = list.querySelectorAll('> div');
            let csv = '電話,姓名,欠費期數,欠費月份\n';
            items.forEach(item => {
                const text = item.innerText;
                const lines = text.split('\n');
                const phone = lines[0].replace('📱 ', '');
                const names = lines[0].replace('📱 ' + phone, '').trim();
                const overdue = lines[1].replace('欠 ', '期');
                const months = lines[2].replace('欠費月份: ', '');
                csv += `${phone},${names},${overdue},${months}\n`;
            });
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `欠費名單_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }
    </script>
</body>
</html>
