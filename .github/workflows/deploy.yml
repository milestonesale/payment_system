name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Authenticate with Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create D1 Database
        run: |
          wrangler d1 create payment_system --location=apac 2>/dev/null || true

      - name: Get D1 Database ID
        id: d1
        run: |
          echo "id=$(wrangler d1 list 2>/dev/null | grep payment_system | awk '{print $2}')" >> $GITHUB_OUTPUT
          echo "id=$(echo ${{ steps.d1.outputs.id }})"

      - name: Deploy Worker
        run: wrangler deploy --env production --dry-run
